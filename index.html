<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENHYPEN × Elina — Paris 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+KR:wght@300;400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #060608;
      --surface:   #0d0d12;
      --orange:    #ff6b1a;
      --orange2:   #ff9a4d;
      --crimson:   #8b0000;
      --gold:      #c9a84c;
      --white:     #f0ede8;
      --muted:     #5a5760;
      --border:    rgba(255,107,26,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background-color: #060608 !important;
    }

    html, body {
      min-height: 100%;
      background: #060608 !important;
      color: var(--white);
      font-family: 'Noto Serif KR', serif;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(139,0,0,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 10% 80%, rgba(255,107,26,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* noise grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
      gap: 0;
    }

    /* ── TOP LINE ── */
    .topline {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.1s ease forwards;
    }

    /* ── TITLE BLOCK ── */
    .title-block {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.3s ease forwards;
    }

    .title-block .en-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 18vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--white) 30%, var(--orange) 70%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(255,107,26,0.3));
    }

    .title-block .subtitle {
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      letter-spacing: 0.25em;
      color: var(--orange2);
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    /* ── GREETING ── */
    .greeting {
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      letter-spacing: 0.12em;
      color: var(--white);
      text-align: center;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s ease forwards;
    }

    .greeting span {
      color: var(--orange);
      font-style: italic;
    }

    /* ── COUNTDOWN GRID ── */
    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(0.6rem, 3vw, 1.4rem);
      width: 100%;
      max-width: 620px;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 1s 0.7s ease forwards;
    }

    .unit {
      background: #f0ede8;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: clamp(1rem, 4vw, 1.6rem) clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }

    .unit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,107,26,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .unit:hover {
      border-color: rgba(255,107,26,0.5);
      transform: translateY(-3px);
    }

    .unit .number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      line-height: 1;
      color: #060608;
      display: block;
      transition: color 0.4s;
    }

    .unit.tick .number {
      color: var(--orange);
      transition: color 0s;
    }

    .unit .label {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.5rem, 1.5vw, 0.65rem);
      letter-spacing: 0.2em;
      color: #888;
      text-transform: uppercase;
      margin-top: 0.35rem;
      display: block;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      width: 100%;
      max-width: 620px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s 0.9s ease forwards;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .progress-meta span {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .progress-meta .pct {
      color: var(--orange);
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--crimson), var(--orange), var(--gold));
      border-radius: 2px;
      transition: width 1s ease;
      box-shadow: 0 0 8px rgba(255,107,26,0.5);
    }

    /* ── EVENT INFO ── */
    .event-info {
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s 1.1s ease forwards;
    }

    .event-info .date-line {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      letter-spacing: 0.15em;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .event-info .venue {
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── DECORATION ── */
    .deco-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      margin: 1.8rem auto;
      opacity: 0;
      animation: fadeUp 1s 1.2s ease forwards;
    }

    .bottom-note {
      font-family: 'Space Mono', monospace;
      font-style: italic;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s 1.3s ease forwards;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 400px) {
      .countdown { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <p class="topline">엔하이픈 &nbsp;·&nbsp; world tour &nbsp;·&nbsp; paris 2027</p>

    <div class="title-block">
      <div class="en-name">ENHYPEN</div>
      <div class="subtitle">Paris · Grand Rex · 27 février 2027</div>
    </div>

    <p class="greeting">Plus que <span id="days-inline">—</span> jours, <span>Elina</span> ✦</p>

    <div class="countdown">
      <div class="unit" id="unit-j">
        <span class="number" id="cd-days">—</span>
        <span class="label">Jours</span>
      </div>
      <div class="unit" id="unit-h">
        <span class="number" id="cd-hours">—</span>
        <span class="label">Heures</span>
      </div>
      <div class="unit" id="unit-m">
        <span class="number" id="cd-mins">—</span>
        <span class="label">Minutes</span>
      </div>
      <div class="unit" id="unit-s">
        <span class="number" id="cd-secs">—</span>
        <span class="label">Secondes</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Temps écoulé depuis aujourd'hui</span>
        <span class="pct" id="pct-label">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="event-info">
      <div class="date-line">27 · 02 · 2027</div>
      <div class="venue">Paris, France &nbsp;·&nbsp; Engene forever 🧡</div>
    </div>

    <div class="deco-line"></div>
    <p class="bottom-note">엔하이픈과 함께 &nbsp;—&nbsp; avec enhypen</p>

  </div>

  <script>
    // Target: 27 February 2027, 20:00 (Paris time — adjust hour if needed)
    var TARGET = new Date('2027-02-27T20:00:00+01:00');
    var START  = new Date(); // page load = start of countdown display

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      var now  = new Date();
      var diff = TARGET - now;

      if (diff <= 0) {
        document.getElementById('cd-days').textContent  = '00';
        document.getElementById('cd-hours').textContent = '00';
        document.getElementById('cd-mins').textContent  = '00';
        document.getElementById('cd-secs').textContent  = '00';
        document.getElementById('days-inline').textContent = '0';
        document.getElementById('progress-fill').style.width = '100%';
        document.getElementById('pct-label').textContent = '100%';
        return;
      }

      var totalSecs = Math.floor(diff / 1000);
      var secs  = totalSecs % 60;
      var mins  = Math.floor(totalSecs / 60) % 60;
      var hours = Math.floor(totalSecs / 3600) % 24;
      var days  = Math.floor(totalSecs / 86400);

      var elDays  = document.getElementById('cd-days');
      var elHours = document.getElementById('cd-hours');
      var elMins  = document.getElementById('cd-mins');
      var elSecs  = document.getElementById('cd-secs');

      elDays.textContent  = days;
      elHours.textContent = pad(hours);
      elMins.textContent  = pad(mins);
      elSecs.textContent  = pad(secs);
      document.getElementById('days-inline').textContent = days;

      // Force dark color on days, hours, minutes
      elDays.style.color  = '#060608';
      elHours.style.color = '#060608';
      elMins.style.color  = '#060608';

      // Secondes : flash orange puis retour noir
      elSecs.style.color = '#ff6b1a';
      setTimeout(function() { elSecs.style.color = '#060608'; }, 150);

      // Progress bar: from today's page-load to concert
      var totalSpan = TARGET - START;
      var elapsed   = now - START;
      var pct = Math.min(100, Math.max(0, (elapsed / totalSpan) * 100));
      // More meaningful: show % of total wait since a fixed "known" date
      // Use Jan 1 2025 as anchor for a satisfying non-zero bar
      var ANCHOR = new Date('2025-01-01T00:00:00');
      var span2  = TARGET - ANCHOR;
      var el2    = now - ANCHOR;
      var pct2   = Math.min(100, Math.max(0, (el2 / span2) * 100));
      var pctRound = pct2.toFixed(1);
      document.getElementById('progress-fill').style.width = pctRound + '%';
      document.getElementById('pct-label').textContent = pctRound + '%';
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
